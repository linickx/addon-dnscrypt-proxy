name: Build HA App/Addon

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: addon-dnscrypt-proxy

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@master
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: docker.io/${{ vars.DOCKERHUB_USERNAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@master
        with:
          arch: ${{ matrix.arch }}
          container-registry: docker.io
          container-registry-username: ${{ vars.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ github.event.release.tag_name }}
            latest
          push: "true"
          version: ${{ github.event.release.tag_name }}
          cosign-base-verify: false # Disabled, as it seem to (try & fail) verify itself before building itself :-/

      - name: Create SBOM
        uses: anchore/sbom-action@v0
        id: my-sbom
        with:
          image: ${{ matrix.image }}:latest
          format: spdx-json
          output-file: SBOM.${{ matrix.arch }}.spdx.json

      #
      # DISABLE as doesn't work with release workflow, and SBOM is available in the build workflow as an artifact
      #
      # - name: Sleep to avoid git clashes
      #   run: |
      #        if [[ "${{ matrix.arch }}" == "aarch64" ]]; then
      #        sleep 10
      #        fi
      #
      # - name: Upload SBOM to git
      #   if: github.event_name == 'workflow_dispatch'
      #   run: |
      #       git config --global user.name "${{ github.actor }}"
      #       git config --global user.email "${{ github.actor }}@users.noreply.github.com"
      #       git pull
      #       git add "SBOM.${{ matrix.arch }}.spdx.json"
      #       git commit -m "SBOM ${{ matrix.arch }} $(date +'%m-%d-%Y %T')"
      #       git push
      #
      # - name: SBOM upload to GitHub API
      #   if: github.event_name == 'workflow_dispatch'
      #   uses: advanced-security/spdx-dependency-submission-action@v0.2.0
      #   with:
      #     filePath: ./

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@master
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry: docker.io
          registry-prefix: docker.io/${{ vars.DOCKERHUB_USERNAME }}
          container-registry-username: ${{ vars.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ github.event.release.tag_name }}
            latest
